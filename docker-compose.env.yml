version: '3.8'

services:
  # Redis/KeyDB
  redis:
    image: redis:7-alpine
    container_name: spinforge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: >
      sh -c "redis-server 
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --appendonly yes 
      --save 60 1 
      --save 300 10"
    volumes:
      - redis-data:/data
    networks:
      - spinforge-network

  # SpinHub - Core Service
  hub:
    build: 
      context: ./packages/spinlet-hub
      dockerfile: Dockerfile
    container_name: spinforge-hub
    ports:
      - "${API_PORT:-9006}:${API_PORT:-9006}"
    environment:
      # Environment
      - NODE_ENV=${NODE_ENV:-development}
      
      # Service Configuration
      - PORT=${API_PORT:-9006}
      - HOST=0.0.0.0
      
      # URLs
      - SPINFORGE_API_URL=${SPINFORGE_API_URL:-http://localhost:9006}
      - SPINFORGE_WEB_URL=${SPINFORGE_WEB_URL:-http://localhost:9010}
      - SPINFORGE_AUTH_URL=${SPINFORGE_AUTH_URL:-http://localhost:3000}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      
      # Authentication
      - AUTH_SECRET=${AUTH_SECRET:-dev-secret-key}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-token}
      
      # Deployment
      - SPINFORGE_DEPLOYMENTS=${SPINFORGE_DEPLOYMENTS:-/spinforge/deployments}
      - SPINLET_STARTUP_TIMEOUT_MS=${SPINLET_STARTUP_TIMEOUT_MS:-300000}
      - IDLE_TIMEOUT_MS=${IDLE_TIMEOUT_MS:-300000}
      
      # Ports
      - PORT_RANGE_START=${PORT_RANGE_START:-10000}
      - PORT_RANGE_END=${PORT_RANGE_END:-20000}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOG_FORMAT=${LOG_FORMAT:-pretty}
      
      # Features
      - ENABLE_HOT_RELOAD=${ENABLE_HOT_RELOAD:-true}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_TELEMETRY=${ENABLE_TELEMETRY:-false}
      
      # Security
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:9010}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
    volumes:
      - ./packages:/app/packages:ro
      - ${SPINFORGE_DEPLOYMENTS:-./deployments}:/spinforge/deployments
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    networks:
      - spinforge-network
    command: sh -c "cd /app && npm run build:all && cd packages/spinlet-hub && npm start"

  # UI Service
  ui:
    build:
      context: ./packages/spinlet-ui
      dockerfile: Dockerfile
    container_name: spinforge-ui
    ports:
      - "${WEB_PORT:-9010}:80"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_URL=${SPINFORGE_API_URL:-http://localhost:9006}
      - VITE_AUTH_URL=${SPINFORGE_AUTH_URL:-http://localhost:3000}
    depends_on:
      - hub
    networks:
      - spinforge-network

  # Builder Service (optional)
  builder:
    build:
      context: ./packages/build-utility
      dockerfile: Dockerfile
    container_name: spinforge-builder
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - BUILD_CACHE_DIR=/builds/cache
      - BUILD_OUTPUT_DIR=/builds/output
    volumes:
      - build-cache:/builds/cache
      - build-output:/builds/output
    depends_on:
      - redis
    networks:
      - spinforge-network
    profiles:
      - full

networks:
  spinforge-network:
    driver: bridge

volumes:
  redis-data:
  build-cache:
  build-output: