worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    
    # DNS resolver for container names
    resolver 127.0.0.11 valid=30s;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Lua settings
    lua_package_path "/etc/openresty/lua/?.lua;;";
    
    # Shared memory zones for caching
    lua_shared_dict routes_cache 50m;
    lua_shared_dict metrics 10m;

    # Initialize Redis connection settings
    init_by_lua_block {
        -- Redis configuration
        redis_host = os.getenv("REDIS_HOST") or "keydb"
        redis_port = tonumber(os.getenv("REDIS_PORT") or 16378)
        redis_password = os.getenv("REDIS_PASSWORD") or nil
        redis_db = tonumber(os.getenv("REDIS_DB") or 1)
    }

    # Health check endpoint
    server {
        listen 8081;
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }

    # Main server block
    server {
        listen 80 default_server;
        server_name _;
        
        # Variables for routing
        set $target_root '';
        set $route_type '';
        
        # Static file handling
        location @static {
            internal;
            root $target_root;
            try_files $uri $uri/ /index.html =404;
        }
        
        # Main routing logic
        location / {
            # Use Lua to determine routing
            access_by_lua_file /etc/openresty/lua/simple-router.lua;
            
            # Route based on type
            content_by_lua_block {
                local route_type = ngx.var.route_type
                
                if route_type == "static" then
                    -- Serve static files
                    return ngx.exec("@static")
                else
                    ngx.status = 404
                    ngx.say("Site not found")
                end
            }
            
            # Log request after processing
            log_by_lua_block {
                local logger = require "logger"
                local subdomain = logger.get_subdomain()
                if subdomain then
                    logger.log_request(subdomain)
                end
            }
        }
        
        # Error pages
        error_page 404 /404.html;
        location = /404.html {
            internal;
            root /var/www/static;
        }
    }
}