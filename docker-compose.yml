services:
  # KeyDB - High-performance Redis fork
  keydb:
    image: eqalpha/keydb:latest
    container_name: spinforge-keydb
    restart: unless-stopped
    ports:
      - "9000:6379"
    volumes:
      - keydb-data:/data
    environment:
      - KEYDB_PASSWORD=${REDIS_PASSWORD:-spinforge123}
    command: keydb-server --appendonly yes --requirepass ${REDIS_PASSWORD:-spinforge123} --save 60 1 --save 300 10
    networks:
      - spinforge-network
    healthcheck:
      test: ["CMD", "keydb-cli", "-a", "${REDIS_PASSWORD:-spinforge123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SpinHub - Main routing and orchestration service
  spinhub:
    image: node:20-alpine
    container_name: spinforge-hub
    working_dir: /spinforge
    restart: unless-stopped
    ports:
      - "9004:8080"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=keydb
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-spinforge123}
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-changeMe123}
      - RATE_LIMIT_GLOBAL=${RATE_LIMIT_GLOBAL:-10000}
      - RATE_LIMIT_CUSTOMER=${RATE_LIMIT_CUSTOMER:-1000}
      - PORT_START=30000
      - PORT_END=40000
      - DEFAULT_MEMORY_LIMIT=512MB
      - DEFAULT_CPU_LIMIT=0.5
    volumes:
      - ./:/spinforge
      - builds-data:/spinforge/builds
      - logs-data:/spinforge/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      keydb:
        condition: service_healthy
    networks:
      - spinforge-network
    command: sh -c "apk add --no-cache git python3 make g++ docker-cli && cd /spinforge && rm -f package-lock.json && mv package.json package.json.bak || true && cd packages/shared && npm install && npx tsc || true && cd ../spinlet-core && npm install && npx tsc || true && cd ../spinlet-hub && npm install && npx tsc || true && node dist/server.js"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Builder Service - Handles compilation of apps
  builder:
    image: node:20-alpine
    container_name: spinforge-builder
    working_dir: /spinforge
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_HOST=keydb
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-spinforge123}
      - BUILD_CACHE_DIR=/spinforge/cache
      - BUILD_OUTPUT_DIR=/spinforge/builds
    volumes:
      - ./:/spinforge
      - builds-data:/spinforge/builds
      - build-cache:/spinforge/cache
    depends_on:
      - keydb
    networks:
      - spinforge-network
    command: sh -c "apk add --no-cache git python3 make g++ docker-cli && cd /spinforge && rm -f package-lock.json && mv package.json package.json.bak || true && cd packages/shared && npm install && npx tsc || true && cd ../spinlet-core && npm install && npx tsc || true && cd ../spinlet-builder && npm install && npx tsc || true && node dist/service.js"

  # Nginx - Reverse proxy and SSL termination
  nginx:
    image: nginx:alpine
    container_name: spinforge-nginx
    restart: unless-stopped
    ports:
      - "9006:80"
      - "9007:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./data/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - spinhub
    networks:
      - spinforge-network

  # Management UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: spinforge-ui
    restart: unless-stopped
    ports:
      - "9010:80"
    depends_on:
      - spinhub
    networks:
      - spinforge-network
    environment:
      - NODE_ENV=production

  # Monitoring - Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: spinforge-prometheus
    restart: unless-stopped
    ports:
      - "9008:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - spinforge-network

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: spinforge-grafana
    restart: unless-stopped
    ports:
      - "9009:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - spinforge-network

  # Backup service - Runs periodic backups
  backup:
    image: alpine:latest
    container_name: spinforge-backup
    restart: unless-stopped
    volumes:
      - keydb-data:/data/keydb:ro
      - builds-data:/data/builds:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      - BACKUP_DIR=/backups
      - DATA_DIR=/data
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    entrypoint: /bin/sh -c "apk add --no-cache bash tar gzip && chmod +x /backup.sh && crond -f -d 8"
    command: |
      sh -c 'echo "0 2 * * * /backup.sh" | crontab - && crond -f -d 8'
    networks:
      - spinforge-network

networks:
  spinforge-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  keydb-data:
    driver: local
  builds-data:
    driver: local
  build-cache:
    driver: local
  logs-data:
    driver: local
  nginx-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local