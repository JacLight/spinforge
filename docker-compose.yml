# CEPH-ENABLED VERSION FOR HIGH AVAILABILITY

services:
  keydb:
    image: eqalpha/keydb:latest
    container_name: spinforge-keydb
    restart: unless-stopped
    volumes:
      - keydb-data:/data
      - ./hosting/keydb/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    environment:
      - KEYDB_PORT=16378
      - KEYDB_PASSWORD=${REDIS_PASSWORD:-}
      # Multi-master: comma-separated host:port of OTHER nodes' KeyDB.
      # Empty = single-node (standalone). Set this when adding more nodes:
      #   KEYDB_PEERS=192.168.88.171:16378,192.168.88.172:16378
      - KEYDB_PEERS=${KEYDB_PEERS:-}
    # Expose KeyDB on the host so other nodes can replicate to/from us
    # over the LAN. Bind to all interfaces for simplicity; firewall this
    # port to the LAN in production.
    ports:
      - "16378:16378"
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    networks:
      spinforge:
        ipv4_address: 172.18.0.10
    dns_opt:
      - use-vc        # force TCP for DNS (avoids flaky UDP)
      - timeout:2
      - attempts:2
      - ndots:1
    healthcheck:
      test: ["CMD", "keydb-cli", "-p", "16378", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openresty:
    build:
      context: ./hosting/openresty
      dockerfile: Dockerfile
    container_name: spinforge-openresty
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8082:8081"
      # HAProxy pass-through ports. HAProxy at 192.168.88.20 targets
      # these; they require a PROXY v2 header or the connection is rejected.
      # NOT for direct client use — customer traffic hits :80/:443.
      - "8480:8480"
      - "8443:8443"
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST:-172.18.0.10}
      - REDIS_PORT=16378
      - REDIS_DB=1
      # Space-separated IPs/CIDRs allowed to send PROXY protocol v2
      # headers. Rendered into /etc/openresty/conf.d/real_ip.conf by
      # docker-entrypoint.sh at container start. Default trusts the
      # whole Proxmox LAN — narrow it to specific HAProxy IPs in
      # production: HAPROXY_TRUSTED_IP="192.168.88.154 192.168.88.155"
      - HAPROXY_TRUSTED_IP=${HAPROXY_TRUSTED_IP:-192.168.88.0/24}
    dns_opt:
      - use-vc        # force TCP for DNS (avoids flaky UDP)
      - timeout:2
      - attempts:2
      - ndots:1
    volumes:
      # Config files - kept local for performance
      - ./hosting/openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./hosting/openresty/lua:/etc/openresty/lua:ro
      # Data directory - single mount point
      - ${SPINFORGE_DATA_ROOT:-./hosting/data}:/data
      # Map cert paths for compatibility
      - ${SPINFORGE_DATA_ROOT:-./hosting/data}/certs:/etc/letsencrypt
      - ${SPINFORGE_DATA_ROOT:-./hosting/data}/certbot-webroot:/var/www/certbot
      - openresty-logs:/var/log/nginx
    # Nginx wants enough open FDs to cover worker_connections × workers.
    # Default container nofile is 1024 — our nginx.conf asks for 2048.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      spinforge:
        ipv4_address: 172.18.0.11
    depends_on:
      keydb:
        condition: service_healthy

  api:
    build:
      context: ./hosting/api
      dockerfile: Dockerfile
    container_name: spinforge-api
    restart: unless-stopped
    labels:
      - "spinforge.domain=api.spinforge.dev"
      - "spinforge.port=8080"
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=${API_PORT}
      - DATA_ROOT=/data
      - STATIC_ROOT=/data/static
      - REDIS_HOST=${REDIS_HOST:-172.18.0.10}
      - REDIS_PORT=16378
      - REDIS_DB=1
    dns_opt:
      - use-vc        # force TCP for DNS (avoids flaky UDP)
      - timeout:2
      - attempts:2
      - ndots:1
    volumes:
      # Single data mount point
      - ${SPINFORGE_DATA_ROOT:-./hosting/data}:/data
    networks:
      spinforge:
        ipv4_address: 172.18.0.12
    depends_on:
      keydb:
        condition: service_healthy
      openresty:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # The certbot container has been removed. ACME issuance and renewal now
  # happen inside the api container via services/AcmeService.js (acme-client
  # npm package). The /data/certbot-webroot directory and openresty's
  # /.well-known/acme-challenge route are still used — the api container now
  # writes challenge files there instead of certbot.

  admin-ui:
    build:
      context: ./apps/admin-ui
      dockerfile: Dockerfile
    container_name: spinforge-admin-ui
    restart: unless-stopped
    labels:
      - "spinforge.domain=admin.spinforge.dev"
      - "spinforge.port=80"
    ports:
      - "8083:80"
    networks:
      spinforge:
        ipv4_address: 172.18.0.14
    depends_on:
      api:
        condition: service_started
      keydb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-4", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  website:
    build:
      context: ./apps/website
      dockerfile: Dockerfile
    container_name: spinforge-website
    restart: unless-stopped
    ports:
      - "8084:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    networks:
      spinforge:
        ipv4_address: 172.18.0.15
    depends_on:
      api:
        condition: service_started
      keydb:
        condition: service_healthy
    healthcheck:
      # --spider only sends HEAD; a wedged Next.js still accepts the TCP
      # connection and then hangs, so HEAD timing out is the only signal.
      # Fetch actual content with a tight per-request timeout so a wedge
      # is caught fast. -T covers connect+read. Retries=2 gives one flake
      # grace, then unhealthy flips inside ~30s total.
      test: ["CMD-SHELL", "wget -qO /dev/null -T 3 --tries=1 http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 60s

  # Per-node agent. Runs on every SpinForge node, reports host + docker
  # state to Redis, listens for targeted commands on a pubsub channel.
  # Needs docker.sock to manage its sibling containers. See
  # hosting/agent/agent.js for the command vocabulary and the security
  # caveats that apply before this is exposed beyond a trusted LAN.
  agent:
    build:
      context: ./hosting/agent
      dockerfile: Dockerfile
    container_name: spinforge-agent
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST:-172.18.0.10}
      - REDIS_PORT=16378
      - REDIS_DB=1
      - AGENT_INTERVAL_MS=15000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Pin hostname from the host so the heartbeat key matches node id.
    # Docker container default hostname is the container id — useless
    # for correlating back to the Proxmox VM.
    hostname: ${SERVER_NAME:-spinforge-node}
    networks:
      - spinforge
    depends_on:
      keydb:
        condition: service_healthy

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: spinforge-mcp
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - SPINFORGE_API_URL=http://api:8080/api
      - PORT=3000
    networks:
      - spinforge
    depends_on:
      - api

volumes:
  keydb-data:
  openresty-logs:

networks:
  spinforge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
