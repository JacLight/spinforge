version: '3.8'

services:
  # Extend the main services with debug configuration
  spinhub:
    extends:
      file: docker-compose.yml
      service: spinhub
    ports:
      - "9004:8080"
      - "9229:9229"  # Node.js debug port
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--inspect=0.0.0.0:9229
    command: sh -c "apk add --no-cache git python3 make g++ docker-cli && cd /spinforge && rm -f package-lock.json && mv package.json package.json.bak || true && cd packages/shared && npm install && npx tsc || true && cd ../spinlet-core && npm install && npx tsc || true && cd ../spinlet-hub && npm install && npx tsc || true && node --inspect=0.0.0.0:9229 dist/server.js"

  builder:
    extends:
      file: docker-compose.yml
      service: builder
    ports:
      - "9230:9230"  # Builder debug port
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--inspect=0.0.0.0:9230
    command: sh -c "apk add --no-cache git python3 make g++ docker-cli && cd /spinforge && rm -f package-lock.json && mv package.json package.json.bak || true && cd packages/shared && npm install && npx tsc || true && cd ../spinlet-core && npm install && npx tsc || true && cd ../spinlet-builder && npm install && npx tsc || true && node --inspect=0.0.0.0:9230 dist/service.js"